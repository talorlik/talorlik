# Refreshes live README content and committed assets:
# - Tech Stack (README + docs/index.html from SKILLS_MANIFEST.yaml)
# - GitHub stats / top langs SVGs (via github-readme-stats-action)
# - Streak / activity graph SVGs (via curl)
# - Live badge metrics + recent activity (GitHub API) inside README markers
#
# Requires secrets.GH_TOKEN (PAT) only if you need higher API limits; otherwise
# secrets.GITHUB_TOKEN is used as a fallback for public API calls.
name: Update README

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update:
    name: Update README, site, and generated assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=talorlik&show_icons=true&theme=tokyonight&include_all_commits=true&count_private=true&hide_border=true
          path: docs/generated/stats.svg
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=talorlik&layout=compact&theme=tokyonight&hide_border=true&langs_count=8
          path: docs/generated/top-langs.svg
          token: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Render skills, fetch remaining SVGs, patch live metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          GH_USERNAME: talorlik
        run: bash scripts/ci-update-readme.sh

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/generated/ docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to README, generated SVGs, or docs site."
            exit 0
          fi
          git commit -m "chore: refresh README stats, activity, and generated assets"
          git push
